---
- name: Deploy WAR to Tomcat
  hosts: app_servers
  become: yes
  gather_facts: yes

  vars:
    war_source: "{{ war_file_path | default('/tmp/app.war') }}"
    tomcat_webapps: /opt/tomcat/webapps

  tasks:
    - name: Check if WAR file exists
      stat:
        path: "{{ war_source }}"
      register: war_stat

    - name: Fail if WAR file not found
      fail:
        msg: "WAR file not found at {{ war_source }}"
      when: not war_stat.stat.exists

    - name: Stop Tomcat
      systemd:
        name: tomcat
        state: stopped

    - name: Backup current application
      shell: |
        if [ -d "{{ tomcat_webapps }}/cicd-app" ]; then
          tar -czf "{{ tomcat_webapps }}/cicd-app.backup.tar.gz" -C "{{ tomcat_webapps }}" cicd-app
        fi
      ignore_errors: yes

    - name: Remove old application
      file:
        path: "{{ tomcat_webapps }}/cicd-app"
        state: absent

    - name: Copy WAR file to Tomcat
      copy:
        src: "{{ war_source }}"
        dest: "{{ tomcat_webapps }}/app.war"
        owner: tomcat
        group: tomcat
        mode: '0644'

    - name: Extract WAR file
      shell: |
        cd {{ tomcat_webapps }}
        mkdir -p cicd-app
        cd cicd-app
        unzip -q ../app.war
        chown -R tomcat:tomcat .

    - name: Start Tomcat
      systemd:
        name: tomcat
        state: started

    - name: Wait for Tomcat to start
      wait_for:
        port: 8080
        delay: 5
        timeout: 300

    - name: Health check - Application endpoint
      uri:
        url: "http://localhost:8080/cicd-app/"
        method: GET
        status_code: [200, 404]
      register: health_check
      retries: 10
      delay: 5

    - name: Display deployment status
      debug:
        msg: |
          Application deployed successfully!
          Application URL: http://<APP_IP>:8080/cicd-app/
          Deployment Status: {{ 'SUCCESS' if health_check.status == 200 else 'DEPLOYED' }}

    - name: Log deployment completion
      shell: |
        echo "Deployment completed at $(date)" >> /var/log/cicd-deployment.log
        echo "WAR source: {{ war_source }}" >> /var/log/cicd-deployment.log
