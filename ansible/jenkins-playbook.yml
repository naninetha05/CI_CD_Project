---
- name: Configure Jenkins Server
  hosts: jenkins
  become: yes
  gather_facts: yes

  tasks:
    - name: Update package manager
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install OpenJDK 11
      apt:
        name: openjdk-11-jdk
        state: present

    - name: Install Maven
      apt:
        name: maven
        state: present

    - name: Install Git
      apt:
        name: git
        state: present

    - name: Install Terraform
      shell: |
        wget https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip
        unzip terraform_1.5.0_linux_amd64.zip
        mv terraform /usr/local/bin/
        terraform version
      args:
        creates: /usr/local/bin/terraform

    - name: Install Ansible
      apt:
        name: ansible
        state: present

    - name: Add Jenkins repository key
      apt_key:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io.key
        state: present

    - name: Add Jenkins repository
      apt_repository:
        repo: deb https://pkg.jenkins.io/debian-stable binary/
        state: present

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present
        update_cache: yes

    - name: Start Jenkins service
      systemd:
        name: jenkins
        state: started
        enabled: yes

    - name: Wait for Jenkins to start
      wait_for:
        port: 8080
        delay: 10
        timeout: 300

    - name: Get initial Jenkins admin password
      shell: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_password
      until: jenkins_password is succeeded
      retries: 5
      delay: 5

    - name: Display Jenkins initial password
      debug:
        msg: "Jenkins initial admin password: {{ jenkins_password.stdout }}"

    - name: Configure Jenkins plugins
      shell: |
        java -jar /var/cache/jenkins/war/WEB-INF/jenkins-cli.jar \
          -s http://localhost:8080 \
          install-plugin pipeline-stage-view github-branch-source sonarqube-generic-coverage \
          || true
      environment:
        JENKINS_USER_ID: admin
      ignore_errors: yes

    - name: Restart Jenkins
      systemd:
        name: jenkins
        state: restarted

    - name: Create Jenkins credentials directory
      file:
        path: /var/lib/jenkins/credentials
        state: directory
        owner: jenkins
        group: jenkins
        mode: '0755'

    - name: Configure Jenkins system properties
      file:
        path: /var/lib/jenkins/init.groovy.d
        state: directory
        owner: jenkins
        group: jenkins
        mode: '0755'

    - name: Display setup instructions
      debug:
        msg: |
          Jenkins is running on http://<JENKINS_IP>:8080
          Initial admin password: {{ jenkins_password.stdout }}
          Please complete the Jenkins setup wizard and configure:
          1. GitHub webhook integration
          2. Maven configuration
          3. SonarQube integration
          4. Terraform configuration
