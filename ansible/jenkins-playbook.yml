---
- name: Configure Jenkins Server
  hosts: jenkins
  become: yes
  gather_facts: yes

  tasks:
    - name: Update package manager
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install OpenJDK 11
      apt:
        name: openjdk-11-jdk
        state: present

    - name: Install Maven
      apt:
        name: maven
        state: present

    - name: Install Git
      apt:
        name: git
        state: present

    - name: Install Terraform
      shell: |
        wget https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip
        unzip terraform_1.5.0_linux_amd64.zip
        mv terraform /usr/local/bin/
        terraform version
      args:
        creates: /usr/local/bin/terraform

    - name: Install Ansible
      apt:
        name: ansible
        state: present

    - name: Remove conflicting Jenkins repo entries
      shell: rm -f /etc/apt/sources.list.d/jenkins.list /usr/share/keyrings/jenkins-keyring.gpg
      ignore_errors: yes

    - name: Add Jenkins repository key
      shell: |
        curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key | \
        gpg --dearmor -o /etc/apt/keyrings/jenkins-keyring.asc
      args:
        creates: /etc/apt/keyrings/jenkins-keyring.asc

    - name: Add Jenkins repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        state: present
        filename: jenkins

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present
        update_cache: yes

    - name: Start Jenkins service
      systemd:
        name: jenkins
        state: started
        enabled: yes

    - name: Wait for Jenkins to start
      wait_for:
        port: 8080
        delay: 10
        timeout: 300

    - name: Get initial Jenkins admin password
      shell: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_password
      ignore_errors: yes

    - name: Display Jenkins initial password
      debug:
        msg: "{{ 'Jenkins initial admin password: ' + jenkins_password.stdout if jenkins_password.rc == 0 else 'Jenkins already configured - no initial password needed' }}"

    - name: Display setup instructions
      debug:
        msg: |
          Jenkins is configured and running on http://{{ inventory_hostname }}:8080
